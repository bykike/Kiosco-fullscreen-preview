<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detector de Tamaño de Pantalla y Navegador</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #info {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Información de Tamaño</h2>
        <p id="monitorInfo"></p>
        <p id="browserInfo"></p>
    </div>

    <script>
        function actualizarInfo() {
            // Tamaño del monitor
            let anchoMonitor = screen.width;
            let altoMonitor = screen.height;
            document.getElementById('monitorInfo').innerHTML = 
                `Resolución del monitor: ${anchoMonitor} x ${altoMonitor} píxeles`;

            // Tamaño del navegador (viewport)
            let anchoViewport = window.innerWidth;
            let altoViewport = window.innerHeight;
            document.getElementById('browserInfo').innerHTML = 
                `Tamaño del viewport: ${anchoViewport} x ${altoViewport} píxeles`;
        }

        // Actualizar la información inicialmente
        actualizarInfo();

        // Actualizar la información cuando se redimensiona la ventana
        window.addEventListener('resize', actualizarInfo);
    </script>
</body>
</html>
